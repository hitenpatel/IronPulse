name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-unit:
    name: Unit Tests (shared + sync + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run shared package tests
        run: pnpm --filter @ironpulse/shared test
      - name: Run sync package tests
        run: pnpm --filter @ironpulse/sync test
      - name: Run mobile unit tests
        run: pnpm --filter @ironpulse/mobile test

  test-api:
    name: API Tests (real PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push database schema
        run: pnpm --filter @ironpulse/db db:push
      - name: Run API tests
        run: pnpm --filter @ironpulse/api test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-unit, test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm --filter @ironpulse/web build

  e2e-maestro:
    name: Mobile E2E (Maestro)
    runs-on: macos-latest
    needs: [build]
    continue-on-error: true
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test
      EXPO_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Install Maestro
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Start iOS Simulator
      - name: Boot iOS Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep "iPhone 15" | head -1 | sed 's/.*(\(.*\)).*/\1/')
          xcrun simctl boot "$DEVICE" || true
          echo "SIMULATOR_UDID=$DEVICE" >> $GITHUB_ENV

      # Install PostgreSQL for API server
      - name: Install PostgreSQL
        run: |
          brew install postgresql@16
          echo 'export PATH="/opt/homebrew/opt/postgresql@16/bin:$PATH"' >> $GITHUB_ENV
          /opt/homebrew/opt/postgresql@16/bin/initdb -D /tmp/pgdata || true
          /opt/homebrew/opt/postgresql@16/bin/pg_ctl -D /tmp/pgdata -l /tmp/pg.log start
          sleep 3
          /opt/homebrew/opt/postgresql@16/bin/createuser -s ironpulse || true
          /opt/homebrew/opt/postgresql@16/bin/createdb ironpulse_test || true
          /opt/homebrew/opt/postgresql@16/bin/psql -c "ALTER USER ironpulse PASSWORD 'ironpulse';" ironpulse_test || true

      # Push schema and seed
      - name: Setup database
        run: pnpm --filter @ironpulse/db db:push
        env:
          DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test

      # Build and start API server in background
      - name: Start API server
        run: |
          pnpm --filter @ironpulse/web dev &
          sleep 15
        env:
          DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test

      # Build Expo dev client for simulator
      - name: Build Expo for simulator
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform ios --clean
          xcodebuild -workspace ios/ironpulse.xcworkspace -scheme ironpulse -configuration Debug -sdk iphonesimulator -destination "id=$SIMULATOR_UDID" build 2>&1 | tail -20

      # Install app on simulator
      - name: Install app
        run: |
          APP_PATH=$(find apps/mobile/ios/build -name "*.app" -type d | head -1)
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      # Run Maestro E2E tests
      - name: Run Maestro tests
        run: |
          maestro test apps/mobile/e2e/auth-signin.yaml || true
          maestro test apps/mobile/e2e/navigation-tabs.yaml || true
          maestro test apps/mobile/e2e/auth-signout.yaml || true

      # Upload Maestro screenshots on failure
      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
