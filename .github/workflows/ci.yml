name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-unit:
    name: Unit Tests (shared + sync + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run shared package tests
        run: pnpm --filter @ironpulse/shared test
      - name: Run sync package tests
        run: pnpm --filter @ironpulse/sync test
      - name: Run mobile unit tests
        run: pnpm --filter @ironpulse/mobile test

  test-api:
    name: API Tests (real PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push database schema
        run: pnpm --filter @ironpulse/db db:push
      - name: Run API tests
        run: pnpm --filter @ironpulse/api test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-unit, test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-
      - name: Build web app
        run: pnpm --filter @ironpulse/web build

  # ── Android: build APK with embedded JS bundle ──
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 60
    env:
      EXPO_PUBLIC_API_URL: http://10.0.2.2:3000
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h /

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      # Deduplicate React for Metro bundling (prevents "useRef is null" crash)
      - name: Deduplicate React
        run: |
          find node_modules -path "*/node_modules/react/index.js" \
            -not -path "node_modules/react/index.js" \
            -not -path "apps/mobile/node_modules/react/index.js" \
            | while read f; do rm -rf "$(dirname "$f")"; done

      - name: Expo prebuild Android
        run: |
          cd apps/mobile
          EXPO_PUBLIC_API_URL=http://10.0.2.2:3000 npx expo prebuild --platform android --no-install

      # Force debug APK to embed JS bundle (no Metro needed at runtime)
      - name: Disable debug dev-server (embed JS bundle)
        run: |
          cd apps/mobile/android/app
          sed -i '/autolinkLibrariesWithApp/i\    debuggableVariants = []' build.gradle

      - name: Restore Gradle cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/package.json') }}
          restore-keys: gradle-

      - name: Build debug APK
        env:
          EXPO_PUBLIC_API_URL: http://10.0.2.2:3000
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Save Gradle cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/package.json') }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  # ── Maestro E2E on Android emulator ──
  e2e-maestro:
    name: Mobile E2E (Maestro)
    runs-on: ubuntu-latest
    needs: [build-android]
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install PostgreSQL (not Docker service — use apt for compatibility)
      - name: Install and start PostgreSQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql postgresql-client postgis postgresql-16-postgis-3 > /dev/null
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          sudo pg_ctlcluster "$PG_VER" main start
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres psql -c "CREATE USER ironpulse WITH PASSWORD 'ironpulse' SUPERUSER;"
          sudo -u postgres createdb -O ironpulse ironpulse_test

      - run: pnpm install --frozen-lockfile

      - name: Push database schema
        run: pnpm --filter @ironpulse/db db:push

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      # Start API server
      - name: Start API server
        run: |
          nohup pnpm --filter @ironpulse/web dev > /tmp/api-server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then echo "ERROR: API failed to start"; exit 1; fi
          done

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: default
          ram-size: 4096
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: true
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
            sleep 5
            adb install apk/app-debug.apk
            adb reverse tcp:3000 tcp:3000
            adb logcat -G 16M
            adb logcat -c
            # Launch app and capture logcat for JS errors
            adb shell am start -n com.ironpulse.app/.MainActivity
            sleep 15
            adb logcat -d | grep -iE "ReactNative|FATAL|Error|error|Exception|crash" | tail -30 > $GITHUB_WORKSPACE/logcat-errors.txt || true
            cat $GITHUB_WORKSPACE/logcat-errors.txt
            echo "=== Running Maestro tests ==="
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/auth-signin.yaml --format junit --output $GITHUB_WORKSPACE/maestro-results.xml --debug-output $GITHUB_WORKSPACE/maestro-debug; echo $? > /tmp/maestro-exit
            echo "=== Maestro auth-signin exit code: $(cat /tmp/maestro-exit) ==="
            # Stabilized flows — failures gate the build
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/auth-signout.yaml
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/navigation-tabs.yaml
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/history-navigation.yaml
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/workout-empty.yaml
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/workout-cancel.yaml
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/weight-log.yaml
            # Complex flows — keep continue-on-error until further stabilized
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/integrations.yaml || true
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/cardio-manual.yaml || true
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/cardio-cancel.yaml || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-report
          path: |
            maestro-results.xml
            maestro-debug/
            logcat-errors.txt
          include-hidden-files: true
          retention-days: 7

  deploy:
    name: Deploy to Production
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ironpulse
            git pull origin main
            docker compose -f docker/docker-compose.yml build app
            docker compose -f docker/docker-compose.yml up -d app
            docker compose -f docker/docker-compose.yml exec app npx prisma migrate deploy
            echo "Deploy complete"

  # ── E2E Dashboard ──
  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: [e2e-maestro]
    if: always() && github.ref == 'refs/heads/main'
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install e2e-dashboard
        run: |
          mkdir -p /tmp/e2e-dash && cd /tmp/e2e-dash
          npm init -y > /dev/null
          npm install hitenpatel/e2e-dashboard

      - name: Checkout gh-pages
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git worktree add dashboard-deploy gh-pages
          else
            mkdir dashboard-deploy
            cd dashboard-deploy && git init && git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi

      - name: Copy dashboard SPA
        run: |
          cp /tmp/e2e-dash/node_modules/e2e-dashboard/dashboard/index.html dashboard-deploy/index.html
          mkdir -p dashboard-deploy/data

      - name: Parse results
        run: |
          node /tmp/e2e-dash/node_modules/e2e-dashboard/bin/cli.js parse \
            --run-id "${{ github.run_id }}" \
            --sha "${GITHUB_SHA::7}" \
            --message "$(git log -1 --format=%s | head -c 120)" \
            --branch "${{ github.ref_name }}" \
            --maestro-android artifacts/maestro-report/maestro-results.xml \
            --screenshots-dir artifacts/maestro-report/ \
            --output-dir dashboard-deploy/screenshots/run-${{ github.run_id }}/ \
            > new-run.json

      - name: Merge history
        run: |
          node /tmp/e2e-dash/node_modules/e2e-dashboard/bin/cli.js merge \
            --history dashboard-deploy/data/history.json \
            --new new-run.json \
            --output dashboard-deploy/data/history.json \
            --max-runs 50 \
            --screenshots-base dashboard-deploy/screenshots/

      - name: Deploy to gh-pages
        run: |
          cd dashboard-deploy
          git add -A
          git -c user.name="github-actions" -c user.email="actions@github.com" \
            commit -m "update dashboard: run ${{ github.run_id }}" --allow-empty
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" 2>/dev/null || true
          git push origin gh-pages --force
