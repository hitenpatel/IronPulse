name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-and-typecheck:
    runs-on: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  test-unit:
    name: Unit Tests (shared + sync)
    runs-on: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run shared package tests
        run: pnpm --filter @ironpulse/shared test
      - name: Run sync package tests
        run: pnpm --filter @ironpulse/sync test

  test-api:
    name: API Tests (real PostgreSQL)
    runs-on: arm64
    services:
      postgres:
        image: imresamu/postgis:16-3.4-alpine  # multi-arch (has arm64, unlike upstream postgis/postgis)
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@postgres:5432/ironpulse_test
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: sk_test_dummy_for_ci_do_not_use
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy_for_ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push database schema
        run: pnpm --filter @ironpulse/db db:push
      - name: Run API tests
        run: pnpm --filter @ironpulse/api test

  build:
    runs-on: arm64
    needs: [lint-and-typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-
      - name: Build web app
        run: pnpm --filter @ironpulse/web build

  # ── Lighthouse CI: web performance + a11y budgets ──
  lighthouse:
    name: Lighthouse CI
    runs-on: arm64
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm --filter @ironpulse/web build
      - name: Run Lighthouse CI
        run: |
          # Run lighthouse against locally-served build
          pnpm --filter @ironpulse/web exec lhci autorun --config=../../lighthouserc.json || echo "Lighthouse assertions failed (advisory)"
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            apps/web/.lighthouseci/
            .lighthouseci/
          retention-days: 7

  # ── Playwright E2E with a11y (axe-core) ──
  e2e-web:
    name: Web E2E + a11y (Playwright)
    runs-on: arm64
    needs: [build]
    continue-on-error: true
    services:
      postgres:
        image: imresamu/postgis:16-3.4-alpine  # multi-arch (has arm64, unlike upstream)
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@postgres:5432/ironpulse_test
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: sk_test_dummy_for_ci_do_not_use
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy_for_ci
      GOOGLE_CLIENT_ID: dummy-google-client-id-for-ci
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret-for-ci
      APPLE_ID: dummy-apple-id-for-ci
      APPLE_SECRET: dummy-apple-secret-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push schema and seed
        run: |
          pnpm --filter @ironpulse/db db:push
          # No '|| true' — exercise seed must succeed or seed:dev produces a
          # workout-less DB and the trpc-fallback / workout specs all fail.
          pnpm --filter @ironpulse/db db:seed
          # E2E specs sign in as athlete@test.com (and other test tier users)
          # which only seed-dev creates. Without this the signIn helper times
          # out at /login on every spec.
          pnpm --filter @ironpulse/db db:seed:dev
      - name: Install Playwright browsers
        run: pnpm --filter @ironpulse/web exec playwright install --with-deps chromium
      - name: Build web app
        run: pnpm --filter @ironpulse/web build
      - name: Start API server
        # next.config.ts sets output: "standalone", which means `next start`
        # silently no-ops (Next prints a warning then never accepts requests).
        # Run the standalone server.js entry directly, after staging the
        # static + public dirs that the bundle expects to find next to it.
        run: |
          set -x
          STANDALONE=apps/web/.next/standalone/apps/web
          ls "$STANDALONE" || true
          cp -r apps/web/.next/static "$STANDALONE/.next/static"
          cp -r apps/web/public "$STANDALONE/public"
          HOSTNAME=0.0.0.0 PORT=3000 nohup node "$STANDALONE/server.js" > /tmp/web-server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then echo "Ready"; break; fi
            sleep 2
          done
          echo "--- web-server.log (post-wait) ---"
          cat /tmp/web-server.log || true
          echo "--- end ---"
          curl -sv http://localhost:3000/api/health 2>&1 | head -20 || true
      - name: Run Playwright tests
        run: pnpm --filter @ironpulse/web test:e2e
        env:
          BASE_URL: http://localhost:3000
      - name: Dump web server log on failure
        if: failure()
        run: |
          echo "=== /tmp/web-server.log ==="
          cat /tmp/web-server.log || echo "(no log)"
          echo "=== end ==="
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  ci-gate:
    name: CI Gate
    runs-on: arm64
    if: always()
    needs: [build]
    steps:
      - name: Check all required jobs
        run: |
          echo "build: ${{ needs.build.result }}"
          # Build and Android E2E must pass. iOS E2E is advisory (simulator flakiness).
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed — blocking"
            exit 1
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: arm64
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [ci-gate]
    steps:
      - name: Deploy to staging VM
        env:
          SSH_KEY: ${{ secrets.VM_SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 172.19.0.1 >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@172.19.0.1 '
            set -e
            cd ~/stack/ironpulse-staging/repo
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            cd ..
            docker compose up -d --build --remove-orphans
          '
          rm -f ~/.ssh/deploy_key

