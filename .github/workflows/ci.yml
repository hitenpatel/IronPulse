name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-unit:
    name: Unit Tests (shared + sync + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run shared package tests
        run: pnpm --filter @ironpulse/shared test
      - name: Run sync package tests
        run: pnpm --filter @ironpulse/sync test
      - name: Run mobile unit tests
        run: pnpm --filter @ironpulse/mobile test

  test-api:
    name: API Tests (real PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push database schema
        run: pnpm --filter @ironpulse/db db:push
      - name: Run API tests
        run: pnpm --filter @ironpulse/api test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-unit, test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache Next.js build
      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-
      - name: Build web app
        run: pnpm --filter @ironpulse/web build

  # Build Android APK separately and cache it
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 60
    env:
      # Baked into APK at build time — 10.0.2.2 is Android emulator's alias for host localhost
      EXPO_PUBLIC_API_URL: http://10.0.2.2:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Use hoisted node_modules for React Native autolinking compatibility
      - run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      # Cache Gradle dependencies and build outputs
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-deps-${{ runner.os }}-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-deps-${{ runner.os }}-

      - name: Expo prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --build-cache

      # Upload APK as artifact for the E2E job
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  e2e-maestro:
    name: Mobile E2E (Maestro)
    runs-on: ubuntu-latest
    needs: [build-android]
    timeout-minutes: 45
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@localhost:5432/ironpulse_test
      EXPO_PUBLIC_API_URL: http://10.0.2.2:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: pnpm install --frozen-lockfile

      # Download pre-built APK
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      # Install Maestro
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # Enable KVM
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Cache AVD
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-${{ runner.os }}

      # Create AVD if not cached
      - name: Create AVD
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD created"

      # Push database schema
      - name: Setup database
        run: pnpm --filter @ironpulse/db db:push

      # Start API server before emulator (so it's ready when Maestro runs)
      - name: Start API server
        run: |
          nohup pnpm --filter @ironpulse/web dev > /tmp/api-server.log 2>&1 &
          echo "API server starting in background..."
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "API server ready!"
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 5
          done

      # Run emulator, install APK, run Maestro
      - name: Run E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Install pre-built APK
            adb install $GITHUB_WORKSPACE/apk/app-debug.apk

            # Dump logcat for debugging if app crashes
            adb logcat -c
            adb shell am start -n com.ironpulse.app/.MainActivity || true
            sleep 10
            adb logcat -d > $GITHUB_WORKSPACE/logcat.txt 2>&1 || true
            adb shell screencap -p /sdcard/after_launch.png && adb pull /sdcard/after_launch.png $GITHUB_WORKSPACE/after_launch.png || true

            # Run only auth-signin for now (diagnostic)
            $HOME/.maestro/bin/maestro test $GITHUB_WORKSPACE/apps/mobile/e2e/auth-signin.yaml --format junit --output $GITHUB_WORKSPACE/maestro-results.xml --debug-output $GITHUB_WORKSPACE/maestro-debug || true

      # Upload test results
      - name: Upload Maestro results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            maestro-results.xml
            maestro-debug/
            logcat.txt
            after_launch.png
            ~/.maestro/tests/
          retention-days: 7
