name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint-and-typecheck:
    runs-on: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  test-unit:
    name: Unit Tests (shared + sync)
    runs-on: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run shared package tests
        run: pnpm --filter @ironpulse/shared test
      - name: Run sync package tests
        run: pnpm --filter @ironpulse/sync test

  test-api:
    name: API Tests (real PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@postgres:5432/ironpulse_test
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: sk_test_dummy_for_ci_do_not_use
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy_for_ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push database schema
        run: pnpm --filter @ironpulse/db db:push
      - name: Run API tests
        run: pnpm --filter @ironpulse/api test

  build:
    runs-on: arm64
    needs: [lint-and-typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Next.js cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-
      - name: Build web app
        run: pnpm --filter @ironpulse/web build

  # ── Lighthouse CI: web performance + a11y budgets ──
  lighthouse:
    name: Lighthouse CI
    runs-on: arm64
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm --filter @ironpulse/web build
      - name: Run Lighthouse CI
        run: |
          # Run lighthouse against locally-served build
          pnpm --filter @ironpulse/web exec lhci autorun --config=../../lighthouserc.json || echo "Lighthouse assertions failed (advisory)"
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            apps/web/.lighthouseci/
            .lighthouseci/
          retention-days: 7

  # ── Playwright E2E with a11y (axe-core) ──
  e2e-web:
    name: Web E2E + a11y (Playwright)
    runs-on: arm64
    needs: [build]
    continue-on-error: true
    services:
      postgres:
        image: imresamu/postgis:16-3.4-alpine  # multi-arch (has arm64, unlike upstream)
        env:
          POSTGRES_USER: ironpulse
          POSTGRES_PASSWORD: ironpulse
          POSTGRES_DB: ironpulse_test
        options: >-
          --health-cmd "pg_isready -U ironpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ironpulse:ironpulse@postgres:5432/ironpulse_test
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: sk_test_dummy_for_ci_do_not_use
      STRIPE_WEBHOOK_SECRET: whsec_test_dummy_for_ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push schema and seed
        run: |
          pnpm --filter @ironpulse/db db:push
          pnpm --filter @ironpulse/db db:seed || true
      - name: Install Playwright browsers
        run: pnpm --filter @ironpulse/web exec playwright install --with-deps chromium
      - name: Build web app
        run: pnpm --filter @ironpulse/web build
      - name: Start API server
        run: |
          nohup pnpm --filter @ironpulse/web start > /tmp/web-server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then echo "Ready"; break; fi
            sleep 2
          done
      - name: Create E2E test user
        run: |
          curl -s -X POST http://localhost:3000/api/trpc/auth.signUp \
            -H "Content-Type: application/json" \
            -d '{"json":{"name":"Test User","email":"test@example.com","password":"password123"}}'
      - name: Run Playwright tests
        run: pnpm --filter @ironpulse/web test:e2e
        env:
          BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  ci-gate:
    name: CI Gate
    runs-on: arm64
    if: always()
    needs: [build]
    steps:
      - name: Check all required jobs
        run: |
          echo "build: ${{ needs.build.result }}"
          # Build and Android E2E must pass. iOS E2E is advisory (simulator flakiness).
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed — blocking"
            exit 1
          fi

