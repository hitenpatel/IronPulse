name: Renovate
on:
  schedule:
    - cron: '0 3 * * 1'  # Monday 3am
  workflow_dispatch:
jobs:
  renovate:
    runs-on: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run Renovate
        run: npx --yes renovate
        env:
          RENOVATE_PLATFORM: gitea
          RENOVATE_ENDPOINT: https://git.hiten-patel.co.uk
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_CONFIG_FILE: renovate.json
          LOG_LEVEL: info
