services:
  ironpulse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://ironpulse:ironpulse@postgres:5432/ironpulse"
      REDIS_URL: "redis://redis:6379"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "ironpulse"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      DEPLOYMENT_MODE: "self-hosted"
      NEXT_PUBLIC_POWERSYNC_URL: "http://powersync:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: ironpulse
      POSTGRES_PASSWORD: ironpulse
      POSTGRES_DB: ironpulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ironpulse &&
      exit 0
      "

  mongo:
    image: mongo:7-jammy
    command: ["--replSet", "rs0"]
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: mongosh --eval "rs.status()" --quiet
      interval: 10s
      retries: 5
    restart: unless-stopped

  mongo-init:
    image: mongo:7-jammy
    depends_on:
      mongo:
        condition: service_healthy
    command: mongosh --host mongo --eval "rs.initiate()"
    restart: "no"

  powersync:
    image: journeyapps/powersync-service:latest
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./powersync.yaml:/app/config/powersync.yaml
      - ./sync-rules.yaml:/app/config/sync-rules.yaml
    environment:
      PS_DATA_SOURCE_URI: "postgresql://ironpulse:ironpulse@postgres:5432/ironpulse"
      PS_MONGO_URI: "mongodb://mongo:27017/powersync"
    ports:
      - "8080:80"
    restart: unless-stopped

  backup:
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - ./backup.sh:/backup.sh:ro
      - backups:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
    entrypoint: /bin/sh
    command: >
      -c "chmod +x /backup.sh && while true; do /backup.sh; sleep 86400; done"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  mongodata:
  backups:
