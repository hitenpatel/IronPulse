## Dev overlay — run with: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d
## Adds Caddy reverse proxy for local domain access, exposes ports, and sets memory limits

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ironpulse
    deploy:
      resources:
        limits:
          memory: 128m
    restart: unless-stopped

  ironpulse:
    environment:
      NEXTAUTH_URL: "https://ironpulse.local"
    deploy:
      resources:
        limits:
          memory: 1g

  postgres:
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m

  minio:
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 512m

  mongo:
    deploy:
      resources:
        limits:
          memory: 512m

  powersync:
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  caddy_data:
  caddy_config:
