## Dev overlay with Sablier — all services sleep after 10min idle, wake on request
## Start: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d
## Only Traefik + Sablier stay running (~80MB). Everything else starts on-demand.

services:
  traefik:
    image: traefik:v2.11
    container_name: ironpulse-traefik
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --experimental.plugins.sablier.modulename=github.com/sablierapp/sablier-traefik-plugin
      - --experimental.plugins.sablier.version=v1.1.0
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-dev-dynamic.yml:/etc/traefik/dynamic.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 128m
    labels:
      - sablier.enable=false

  sablier:
    image: sablierapp/sablier:1.11.1
    container_name: ironpulse-sablier
    restart: unless-stopped
    command:
      - start
      - --provider.name=docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64m
    labels:
      - sablier.enable=false


  postgres:
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1g
    labels:
      - sablier.enable=true
      - sablier.group=ironpulse-dev

  redis:
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m
    labels:
      - sablier.enable=true
      - sablier.group=ironpulse-dev

  minio:
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 512m
    labels:
      - sablier.enable=true
      - sablier.group=ironpulse-dev

  mongo:
    deploy:
      resources:
        limits:
          memory: 512m
    labels:
      - sablier.enable=true
      - sablier.group=ironpulse-dev

  powersync:
    deploy:
      resources:
        limits:
          memory: 512m
    labels:
      - sablier.enable=true
      - sablier.group=ironpulse-dev
