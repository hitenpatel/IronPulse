<!-- IronPulse app mark — cobalt dumbbell line art + lime pulse on cream tile.
     The canonical asset is designs/IronPulse-logo.png; this SVG is a
     lightweight path-only proxy used for favicon and embed contexts
     that expect vector. Keep them in sync. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#F9F4E1"/>
  <g stroke="#1B2565" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- LEFT plate stack -->
    <rect x="88"  y="206" width="28"  height="100" rx="8"/>
    <rect x="130" y="172" width="38"  height="168" rx="10"/>
    <rect x="178" y="158" width="32"  height="196" rx="10"/>
    <!-- RIGHT plate stack -->
    <rect x="302" y="158" width="32"  height="196" rx="10"/>
    <rect x="344" y="172" width="38"  height="168" rx="10"/>
    <rect x="396" y="206" width="28"  height="100" rx="8"/>
    <!-- Bar segments (interrupted by the pulse in the middle) -->
    <path d="M 210 256 L 232 256"/>
    <path d="M 280 256 L 302 256"/>
  </g>
  <!-- ECG pulse in lime -->
  <path d="M 210 256 L 228 256 L 236 208 L 248 310 L 256 188 L 268 324 L 278 256 L 302 256"
        stroke="#8BC53F" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
