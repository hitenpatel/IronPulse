# Prod smoke: the SHIPPING build (com.ironpulse.app, pointed at production)
# launches and renders the login screen. Validates the literal store artifact
# boots — the class of bug that broke the app earlier this week.
appId: com.ironpulse.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- assertVisible:
    id: "login-button"
