appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
- waitForAnimationToEnd
- tapOn: "Stats"
- extendedWaitUntil:
    visible:
      id: "stats-heading"
    timeout: 10000
- waitForAnimationToEnd
- tapOn: "Exercises"
- extendedWaitUntil:
    visible:
      id: "exercises-heading"
    timeout: 10000
- waitForAnimationToEnd
- tapOn: "Profile"
- extendedWaitUntil:
    visible:
      id: "profile-heading"
    timeout: 10000
- waitForAnimationToEnd
- tapOn: "Home"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 10000
