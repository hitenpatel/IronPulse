appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 15000
- waitForAnimationToEnd
- tapOn:
    id: "tab-stats"
- extendedWaitUntil:
    visible: "Stats"
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "tab-exercises"
- extendedWaitUntil:
    visible: "Exercises"
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible: "Profile"
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "tab-home"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 10000
