appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- assertVisible:
    id: "greeting"
- tapOn:
    id: "fab-button"
- tapOn: "Start Cardio"
- assertVisible: "Run"
- back
- assertVisible:
    id: "greeting"
