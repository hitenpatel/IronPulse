appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
- waitForAnimationToEnd
- tapOn: "Profile"
- tapOn: "Password & Passkeys"
- extendedWaitUntil:
    visible:
      text: "Passkeys"
    timeout: 10000
- assertVisible: "Change Password"
- assertVisible: "Current Password"
- assertVisible: "New Password"
