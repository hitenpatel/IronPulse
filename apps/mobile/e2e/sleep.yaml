appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
- waitForAnimationToEnd
- tapOn: "Profile"
- tapOn: "Sleep"
- extendedWaitUntil:
    visible:
      text: "Log Sleep"
    timeout: 10000
- assertVisible: "Poor"
- assertVisible: "Fair"
- assertVisible: "Good"
- assertVisible: "Excellent"
- assertVisible: "Recent Sleep"
