appId: com.ironpulse.app
---
- launchApp
- waitForAnimationToEnd
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "signin-button"
- assertVisible: "Good morning"
- tapOn:
    id: "fab-button"
- tapOn: "Start Workout"
- tapOn: "Empty Workout"
- assertVisible: "Finish"
- tapOn:
    id: "add-exercise-button"
- inputText: "Bench"
- tapOn: "Bench Press"
- tapOn:
    id: "weight-input-0-0"
- inputText: "80"
- tapOn:
    id: "reps-input-0-0"
- inputText: "8"
- tapOn:
    id: "complete-set-0-0"
- tapOn:
    id: "finish-button"
- assertVisible: "Workout Complete"
- tapOn: "Done"
- assertVisible: "Good morning"
