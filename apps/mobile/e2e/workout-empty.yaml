appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
- waitForAnimationToEnd
- tapOn:
    id: "fab-button"
- extendedWaitUntil:
    visible:
      id: "fab-start-workout"
    timeout: 10000
- tapOn:
    id: "fab-start-workout"
- extendedWaitUntil:
    visible: "Empty Workout"
    timeout: 10000
- tapOn: "Empty Workout"
- extendedWaitUntil:
    visible: "Finish"
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "add-exercise-button"
- extendedWaitUntil:
    visible:
      id: "exercise-search-input"
    timeout: 10000
- inputText: "Bench"
- extendedWaitUntil:
    visible: "Bench Press"
    timeout: 10000
- tapOn:
    id: "exercise-item-bench-press"
- hideKeyboard
- extendedWaitUntil:
    visible: "Finish"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "weight-input-0-0"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "weight-input-0-0"
- inputText: "80"
- hideKeyboard
- tapOn:
    id: "reps-input-0-0"
- inputText: "8"
- hideKeyboard
- tapOn:
    id: "complete-set-0-0"
- tapOn:
    id: "finish-button"
- extendedWaitUntil:
    visible: "Workout Complete"
    timeout: 60000
- tapOn: "Done"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 10000
