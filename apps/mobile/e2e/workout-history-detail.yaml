appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 15000
- waitForAnimationToEnd
- tapOn: "Workout History"
- extendedWaitUntil:
    visible: "Workouts"
    timeout: 10000
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "No workouts yet"
    commands:
      - assertVisible: "No workouts yet"
- runFlow:
    when:
      notVisible: "No workouts yet"
    commands:
      - tapOn:
          index: 0
      - extendedWaitUntil:
          visible: "Duration"
          timeout: 10000
      - assertVisible: "Volume"
      - assertVisible: "Exercises"
