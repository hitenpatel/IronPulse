appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
    permissions:
      location: allow
      notifications: allow
- waitForAnimationToEnd
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- assertVisible: "Good morning"
- tapOn:
    id: "fab-button"
- tapOn: "Start Cardio"
- tapOn: "Run"
- tapOn: "Track with GPS"
- assertVisible: "Stop"
