appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
    permissions:
      location: allow
      notifications: allow
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
- tapOn:
    id: "fab-button"
- extendedWaitUntil:
    visible:
      id: "fab-start-cardio"
    timeout: 10000
- tapOn:
    id: "fab-start-cardio"
- extendedWaitUntil:
    visible: "Run"
    timeout: 10000
- tapOn: "Run"
- extendedWaitUntil:
    visible: "Track with GPS"
    timeout: 10000
- tapOn: "Track with GPS"
- extendedWaitUntil:
    visible: "Stop"
    timeout: 15000
