appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
- waitForAnimationToEnd
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000
- tapOn: "Sign Out"
- extendedWaitUntil:
    visible: "Log In"
    timeout: 10000
