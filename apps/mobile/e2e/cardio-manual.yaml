appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 30000
- waitForAnimationToEnd
- tapOn:
    id: "fab-button"
- extendedWaitUntil:
    visible: "Start Cardio"
    timeout: 10000
- tapOn: "Start Cardio"
- extendedWaitUntil:
    visible: "Run"
    timeout: 10000
- tapOn: "Run"
- extendedWaitUntil:
    visible: "Log Manually"
    timeout: 10000
- tapOn: "Log Manually"
- extendedWaitUntil:
    visible:
      id: "duration-minutes"
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "duration-minutes"
- inputText: "30"
- tapOn:
    id: "distance-input"
- inputText: "5.0"
- tapOn:
    id: "save-cardio"
- extendedWaitUntil:
    visible: "Run"
    timeout: 10000
- tapOn: "Done"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 10000
