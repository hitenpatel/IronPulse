appId: com.ironpulse.app
---
- launchApp
- waitForAnimationToEnd
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "signin-button"
- assertVisible: "Good morning"
- tapOn:
    id: "fab-button"
- tapOn: "Log Cardio"
- tapOn: "Run"
- tapOn: "Log Manually"
- tapOn:
    id: "duration-minutes"
- inputText: "30"
- tapOn:
    id: "distance-input"
- inputText: "5.0"
- tapOn:
    id: "save-cardio"
- assertVisible: "Run"
- tapOn: "Done"
- assertVisible: "Good morning"
