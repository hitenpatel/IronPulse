appId: com.ironpulse.app
---
- launchApp
- waitForAnimationToEnd
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "signin-button"
- tapOn: "Stats"
- tapOn:
    id: "weight-input"
- inputText: "75.5"
- tapOn:
    id: "log-weight"
- assertVisible: "75.5"
