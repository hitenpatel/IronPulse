appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 30000
- waitForAnimationToEnd
- tapOn: "Stats"
- extendedWaitUntil:
    visible:
      id: "weight-input"
    timeout: 10000
- tapOn:
    id: "weight-input"
- inputText: "75.5"
- tapOn:
    id: "log-weight"
- extendedWaitUntil:
    visible: "75.5"
    timeout: 10000
