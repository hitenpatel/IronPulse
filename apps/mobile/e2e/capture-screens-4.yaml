appId: com.ironpulse.app
---
# Populate the active workout with a real exercise so the screenshot is useful
# for design iteration (empty state isn't — this is the screen users live in).

- launchApp
- waitForAnimationToEnd

- tapOn: "Home"
- waitForAnimationToEnd
- tapOn: "Start Workout"
- waitForAnimationToEnd

- tapOn: "Add Exercise"
- waitForAnimationToEnd
- takeScreenshot: 05c-exercise-picker

# Pick the first exercise in the list
- hideKeyboard
- tapOn: "3/4 Sit-Up"
- waitForAnimationToEnd
- takeScreenshot: 05d-active-workout-with-exercise

# Add another to get a superset-eligible view
- tapOn: "Add Exercise"
- waitForAnimationToEnd
- hideKeyboard
- tapOn: "90/90 Hamstring"
- waitForAnimationToEnd
- takeScreenshot: 05e-active-workout-two-exercises
