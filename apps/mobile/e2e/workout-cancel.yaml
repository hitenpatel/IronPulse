appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 15000
- waitForAnimationToEnd
- tapOn:
    id: "fab-button"
- extendedWaitUntil:
    visible: "Start Workout"
    timeout: 10000
- tapOn: "Start Workout"
- extendedWaitUntil:
    visible: "Empty Workout"
    timeout: 10000
- tapOn: "Empty Workout"
- extendedWaitUntil:
    visible: "Finish"
    timeout: 10000
- waitForAnimationToEnd
- tapOn: "Cancel"
- extendedWaitUntil:
    visible: "Discard"
    timeout: 10000
- tapOn: "Discard"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 10000
