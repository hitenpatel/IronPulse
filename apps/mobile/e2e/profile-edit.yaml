appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 15000
- waitForAnimationToEnd
- tapOn: "Profile"
- extendedWaitUntil:
    visible: "Profile"
    timeout: 10000
- assertVisible: "Name"
- assertVisible: "Email"
- assertVisible: "Units"
- assertVisible: "metric"
- assertVisible: "imperial"
- tapOn: "imperial"
- waitForAnimationToEnd
- tapOn: "metric"
- waitForAnimationToEnd
- assertVisible: "Connected Apps"
- assertVisible: "Sign Out"
