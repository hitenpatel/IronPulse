appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "forgot-password-link"
- extendedWaitUntil:
    visible:
      id: "forgot-email-input"
    timeout: 10000
- tapOn:
    id: "forgot-email-input"
- inputText: "test@example.com"
- tapOn:
    id: "forgot-submit-button"
- extendedWaitUntil:
    visible: "reset link"
    timeout: 10000
- tapOn:
    id: "forgot-back-button"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 10000
