appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Good morning"
    timeout: 15000
- waitForAnimationToEnd
- tapOn: "Stats"
- extendedWaitUntil:
    visible:
      id: "weight-input"
    timeout: 10000
- tapOn:
    id: "weight-input"
- inputText: "80.0"
- tapOn:
    id: "body-fat-input"
- inputText: "18.5"
- tapOn:
    id: "log-weight"
- extendedWaitUntil:
    visible: "80"
    timeout: 10000
- assertVisible: "18.5% body fat"
