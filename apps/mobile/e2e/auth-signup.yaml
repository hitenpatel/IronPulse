appId: com.ironpulse.app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- tapOn: "Sign Up"
- tapOn:
    id: "name-input"
- inputText: "Test User"
- tapOn:
    id: "signup-email-input"
- inputText: "test-signup@example.com"
- tapOn:
    id: "signup-password-input"
- inputText: "Password123!"
- tapOn: "Create Account"
- assertVisible: "Good morning"
