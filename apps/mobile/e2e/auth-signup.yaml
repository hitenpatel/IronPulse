appId: com.ironpulse.app
---
- launchApp:
    clearKeychain: true
    clearState: true
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000
- tapOn:
    id: "signup-link"
- tapOn:
    id: "name-input"
- inputText: "Test User"
- tapOn:
    id: "signup-email-input"
- inputText: "test-signup@example.com"
- tapOn:
    id: "signup-password-input"
- inputText: "Password123!"
- tapOn:
    point: "50%,5%"
- tapOn:
    id: "create-account-button"
- extendedWaitUntil:
    visible:
      id: "greeting"
    timeout: 60000
